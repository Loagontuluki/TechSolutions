<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechFix Solutions | Feedback</title>


</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-flex">
      <div class="nav-left">
        <nav>
          <ul class="nav-list">
           <li><a href="index.html" class="active">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="solutions.html">Solutions</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="feedback.html">Feedback</a></li>
          </ul>
        </nav>
      </div>

      <div class="nav-right">
        <img src="logo.jpg" alt="TechFix Solutions Logo" class="logo" />
      </div>
    </div>
  </header>

  <!-- Feedback Hero -->
  <section class="hero-video">
    <video autoplay muted loop id="bg-video">
      <source src="tech-background.mp4" type="video/mp4" />
      Your browser does not support HTML5 video.
    </video>

    <div class="hero-text">
      <h1>We Value Your Feedback</h1>
      <p>Your experience helps us improve our IT services.</p>
    </div>
  </section>

  <!-- Feedback Form Section -->
  <section class="feedback-form-section">
    <div class="container">
      <h2 class="form-title">Tell Us What You Think</h2>

      <form class="feedback-form">
        <input type="text" placeholder="Your Name" required />
        <input type="email" placeholder="Your Email" required />
        <textarea rows="5" placeholder="Your Message..." required></textarea>
        <button type="submit">Submit Feedback</button>
      </form>
    </div>
  </section>

  <!-- Thank You Modal -->
  <div id="thankYouModal" class="modal">
    <div class="modal-content">
      <h2>Thank You!</h2>
      <p>Your feedback has been successfully sent to TechFix Solutions.</p>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-flex">
      <p>&copy; 2025 TechFix Solutions. All rights reserved.</p>

      <div class="social-links">
        <a href="#" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="#" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
      </div>
    </div>
  </footer>

  <!-- Script (UNCHANGED LOGIC) -->
  <script>
    const form = document.querySelector(".feedback-form");
    const modal = document.getElementById("thankYouModal");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      modal.style.display = "flex";
      form.reset();
    });

    function closeModal() {
      modal.style.display = "none";
    }

    window.onclick = function (e) {
      if (e.target === modal) {
        modal.style.display = "none";
      }
    };
  </script>

</body>
</html>
``
